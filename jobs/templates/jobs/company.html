<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Analysis - CareerInsight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fb; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-[#00236f] fixed top-0 w-full z-50 shadow-md">
        <nav class="flex justify-between items-center w-full px-10 max-w-[1280px] mx-auto h-16">

                <a class="text-2xl font-bold text-white" href="{% url 'index' %}">CareerInsight</a>
                
                <div class="hidden md:flex gap-6 items-center h-full">
                    <a class="text-white/80 hover:text-white transition-colors font-medium" href="{% url 'index' %}">Home</a>
                    <a class="border-b-4 border-[#0058be] text-white font-bold pb-1" href="{% url 'company_analysis' %}">Company Analysis</a>
                    <a class="text-white/80 hover:text-white transition-colors font-medium" href="{% url 'dashboard' %}">Job Matching</a>
                    <a class="text-white/80 hover:text-white transition-colors font-medium" href="{% url 'my_spec' %}">My Spec</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button class="material-symbols-outlined text-white p-2 hover:bg-white/10 rounded-full transition-all">notifications</button>
                <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white/20 bg-white">
                    <img alt="User profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXp50DcKKiSscua7T66IPGt4GspQvY3kWxh9oU5Yk8SC1gSX3SeY7SF1VNbW0CdgHNvmGfD8zJiXx2R27youMu-VXCOQnX0SzRynmspCvN4If_rv5k6YaAwuMUPbwh0h9NiI3D1QbPlMVU3eejiuKmDdj79yc6vFgmibSCsA08LDBmKSYYo97sm4cWiy6ODKorS8-GvEyRDwu0j_NQAb9UeKxkyMLo88U0fCOePFGiY8U10LxZAHAGdPTbmUsuQCSFtTzcQnZFlLVI"/>
                </div>
            </div>
        </nav>
    </header>

    <main class="pt-24 pb-12 px-6 max-w-[1280px] mx-auto min-h-screen flex items-center justify-center">
        <div class="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center max-w-2xl w-full">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="material-symbols-outlined text-5xl text-blue-600">domain</span>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-4">기업 분석 데이터 연동 중</h1>
            <p class="text-slate-500 mb-8 leading-relaxed">
                현재 AI가 5,000개 이상의 기업 재무제표와 조직 문화 데이터를 수집하여 분석하고 있습니다.<br>
                이 페이지는 곧 업데이트될 예정입니다.
            </p>
            <div class="flex justify-center gap-4">
                <a href="{% url 'dashboard' %}" class="px-6 py-3 bg-[#0058be] text-white rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-sm">
                    내 대시보드로 가기
                </a>
                <a href="{% url 'index' %}" class="px-6 py-3 border border-slate-300 text-slate-600 rounded-lg font-bold hover:bg-slate-50 transition-colors">
                    메인 홈으로
                </a>
            </div>
        </div>
