<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마이 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="max-w-4xl mx-auto p-6">
        
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h1 class="text-2xl font-bold text-blue-600">My Dashboard</h1>
            <a href="{% url 'index' %}" class="text-sm text-slate-500 hover:text-slate-700">← 메인 홈으로</a>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xl font-bold mb-2">안녕하세요! 👋</h2>
            <p class="text-slate-600">현재 탐색 중인 스킬셋: 
                <span class="bg-blue-100 text-blue-800 px-2.5 py-1 rounded-md text-xs font-bold ml-1">Python</span> 
                <span class="bg-blue-100 text-blue-800 px-2.5 py-1 rounded-md text-xs font-bold">Django</span>
            </p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-slate-900">🎯 AI 추천 맞춤 채용 공고</h3>
                <button id="load-jobs-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition font-semibold text-sm shadow-sm">
                    추천 공고 매칭하기
                </button>
            </div>

            <div id="job-list-container" class="space-y-4">
                <p class="text-slate-400 text-center py-8">오른쪽 위의 '추천 공고 매칭하기' 버튼을 누르면 매칭이 시작됩니다.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('load-jobs-btn').addEventListener('click', function() {
            const container = document.getElementById('job-list-container');
            
            // 1. 로딩 상태 표시
            container.innerHTML = `
                <div class="text-center py-8">
                    <p class="text-blue-500 font-medium animate-pulse">상황 분석 및 공고 매칭 알고리즘 가동 중...</p>
                </div>
            `;

            // 2. views.py의 recommended_jobs 함수 호출: 'jobs:' 제거 완료
            fetch("{% url 'recommended_jobs' %}")
                .then(response => response.json())
                .then(data => {
                    container.innerHTML = ''; // 로딩 메시지 비우기
                    
                    if (!data.jobs || data.jobs.length === 0) {
                        container.innerHTML = '<p class="text-slate-400 text-center py-8">조건에 맞는 추천 공고가 없습니다.</p>';
                        return;
                    }

                    // 3. 데이터를 반복문 돌면서 이쁜 HTML 카드로 변경 후 삽입
                    data.jobs.forEach(job => {
                        // 스킬 태그 조립
                        const skillTags = job.skills.map(skill => 
                            `<span class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded">${skill}</span>`
                        ).join('');

                        // 카드 한 장 틀 생성
                        const cardHtml = `
                            <div class="border border-slate-100 p-5 rounded-xl bg-slate-50 hover:border-blue-300 hover:bg-white transition shadow-sm flex justify-between items-center">
                                <div>
                                    <span class="inline-block bg-emerald-100 text-emerald-800 text-[11px] px-2 py-0.5 rounded font-bold mb-1.5">${job.company_name}</span>
                                    <h4 class="text-base font-bold text-slate-900">${job.title}</h4>
                                    <div class="flex gap-1.5 mt-2.5">
                                        ${skillTags}
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="text-3xl font-black text-blue-600">${job.match_rate}%</span>
                                    <p class="text-[10px] text-slate-400 font-medium mt-0.5">스킬 일치도</p>
                                </div>
                            </div>
                        `;
                        // 그릇에 챡 붙여넣기
                        container.insertAdjacentHTML('beforeend', cardHtml);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    container.innerHTML = '<p class="text-red-500 text-center py-8">공고를 불러오는 중 네트워크 에러가 발생했습니다.</p>';
                });
        });
    </script>
</body>
</html>
