{% extends 'base.html' %}

{% block title %}프로필 수정 - 자소서 메이트{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-md mt-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">프로필 수정</h1>
    <form method="post" action="{% url 'accounts:profile_update' %}" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="education" class="block text-sm font-medium text-gray-700">학력</label>
            <input type="text" id="education" name="education" value="{{ profile.education|default_if_none:'' }}"
                   class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
            <label for="language_score" class="block text-sm font-medium text-gray-700">어학 성적</label>
            <input type="number" id="language_score" name="language_score" value="{{ profile.language_score|default_if_none:'0' }}"
                   class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">보유 기술</label>
            <div class="mt-1 grid grid-cols-2 gap-2">
                {% for skill in all_skills %}
                <div class="flex items-center">
                    <input type="checkbox" id="skill_{{ skill.id }}" name="skills" value="{{ skill.id }}"
                           {% if skill in profile.skills.all %}checked{% endif %}
                           class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="skill_{{ skill.id }}" class="ml-2 text-sm text-gray-900">{{ skill.name }}</label>
                </div>
                {% endfor %}
            </div>
        </div>
        <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            저장
        </button>
    </form>
</div>
{% endblock %}
