{% extends 'base.html' %}

{% block title %}대외활동 정보 수정 - 자소서 메이트{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-md mt-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{% if object %}대외활동 수정{% else %}대외활동 추가{% endif %}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex justify-end space-x-4">
            <a href="{% url 'accounts:profile_dashboard' %}" class="px-4 py-2 bg-gray-200 text-gray-800 font-medium rounded-md hover:bg-gray-300">
                취소
            </a>
            <button type="submit"
                    class="px-4 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700">
                저장
            </button>
        </div>
    </form>
</div>
{% endblock %}
